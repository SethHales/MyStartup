<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scriptures Logo Options</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111827;
        --muted: #6b7280;
        --card: #ffffff;
        --line: #e5e7eb;
        --paper: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 16% 12%, rgba(17, 24, 39, 0.08), transparent 28rem),
          linear-gradient(135deg, #ffffff 0%, #f3f4f6 100%);
        color: var(--ink);
        padding: 40px 22px;
      }

      main {
        width: min(1100px, 100%);
        margin: 0 auto;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 5vw, 4.2rem);
        letter-spacing: -0.07em;
        line-height: 0.94;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
      }

      .current {
        display: grid;
        place-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .current img {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        box-shadow: 0 16px 36px rgba(17, 24, 39, 0.16);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 16px;
      }

      .card {
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 18px;
        box-shadow: 0 18px 46px rgba(17, 24, 39, 0.08);
      }

      .logo-stage {
        display: grid;
        place-items: center;
        min-height: 190px;
        border-radius: 18px;
        background:
          linear-gradient(45deg, rgba(17, 24, 39, 0.035) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(17, 24, 39, 0.035) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, rgba(17, 24, 39, 0.035) 75%),
          linear-gradient(-45deg, transparent 75%, rgba(17, 24, 39, 0.035) 75%),
          var(--paper);
        background-size: 22px 22px;
        background-position: 0 0, 0 11px, 11px -11px, -11px 0;
      }

      .logo-stage img {
        width: 122px;
        height: 122px;
        image-rendering: auto;
      }

      .meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 14px;
      }

      .name {
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .tag {
        border: 1px solid #d1d5db;
        border-radius: 999px;
        padding: 5px 9px;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        white-space: nowrap;
      }

      @media (max-width: 640px) {
        body {
          padding: 28px 14px;
        }

        header {
          align-items: start;
          flex-direction: column;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Scriptures Logo Options</h1>
          <p>Seven black-on-white open-book directions, sized larger inside the QuickSets-style app tile.</p>
        </div>
        <div class="current">
          <img src="./icon-v1.svg" alt="Current Scriptures app icon" />
          <span>Current icon</span>
        </div>
      </header>

      <section class="grid" aria-label="Logo options">
        <article class="card">
          <div class="logo-stage"><img src="./scriptures-book-option-01.svg" alt="Scriptures logo option 1" /></div>
          <div class="meta"><span class="name">Option 1</span><span class="tag">Classic</span></div>
        </article>
        <article class="card">
          <div class="logo-stage"><img src="./scriptures-book-option-02.svg" alt="Scriptures logo option 2" /></div>
          <div class="meta"><span class="name">Option 2</span><span class="tag">Bookmark</span></div>
        </article>
        <article class="card">
          <div class="logo-stage"><img src="./scriptures-book-option-03.svg" alt="Scriptures logo option 3" /></div>
          <div class="meta"><span class="name">Option 3</span><span class="tag">Lifted</span></div>
        </article>
        <article class="card">
          <div class="logo-stage"><img src="./scriptures-book-option-04.svg" alt="Scriptures logo option 4" /></div>
          <div class="meta"><span class="name">Option 4</span><span class="tag">Bold</span></div>
        </article>
        <article class="card">
          <div class="logo-stage"><img src="./scriptures-book-option-05.svg" alt="Scriptures logo option 5" /></div>
          <div class="meta"><span class="name">Option 5</span><span class="tag">Spark</span></div>
        </article>
        <article class="card">
          <div class="logo-stage"><img src="./scriptures-book-option-06.svg" alt="Scriptures logo option 6" /></div>
          <div class="meta"><span class="name">Option 6</span><span class="tag">Outlined</span></div>
        </article>
        <article class="card">
          <div class="logo-stage"><img src="./scriptures-book-option-07.svg" alt="Scriptures logo option 7" /></div>
          <div class="meta"><span class="name">Option 7</span><span class="tag">Arched</span></div>
        </article>
      </section>
    </main>
  </body>
</html>
